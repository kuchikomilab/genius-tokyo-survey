<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GENIUS TOKYO お客様アンケート</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Serif+JP:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet" />
  <script>
  // ====================================================
  //  CONFIG — 店舗ごとにここだけ書き換えてください
  // ====================================================
  const CONFIG = {
    shopName:       "GENIUS TOKYO",
    shopCategory:   "ナイトクラブ・イベントスペース",
    logoUrl:        "",
    headerImageUrl: "",
    themeColor:     "#0A0A0B",
    accentColor:    "#C9A646",
    // Googleビジネスプロフィールの「口コミ投稿URL」または Place ID を設定してください
    // 例）googleReviewUrl: "https://g.page/r/xxxxxxxx/review"
    googlePlaceId:  "ChIJg69aQe-LGGAROkeDEH_oeao",
    googleReviewUrl:"",
    // GAS連携用：Google Apps ScriptをウェブアプリとしてデプロイしたURLを入れてください
    // 例）gasWebAppUrl: "https://script.google.com/macros/s/xxxxxxxx/exec"
    gasWebAppUrl:"",
    // GitHub Pages + GAS版です。
    // 回答データはGAS経由でGoogleスプレッドシートに保存します。
    thankYouMessage:"ご回答ありがとうございました",
    copyButtonText: "口コミ用メッセージをコピーする",
    questions: [
      { id:"overall",  type:"stars",    label:"本日のGENIUS TOKYOでのご体験は、総合的にいかがでしたか？", required:true },
      { id:"music",    type:"stars",    label:"音楽・DJ・選曲はいかがでしたか？", required:true },
      { id:"atmosphere", type:"stars",  label:"店内の雰囲気・盛り上がりはいかがでしたか？", required:true },
      { id:"staff",    type:"stars",    label:"スタッフの接客・ご案内はいかがでしたか？", required:true },
      { id:"drink",    type:"stars",    label:"ドリンク・バーのご利用はいかがでしたか？", required:false },
      { id:"revisit",  type:"radio",    label:"またGENIUS TOKYOに来たいと思いますか？", required:true,
        options:["ぜひまた来たい","友人にも紹介したい","機会があれば来たい","今のところ未定"] },
      { id:"purpose",  type:"radio",    label:"本日はどのような目的でご来店されましたか？", required:false,
        options:["友人・知人との来店","イベント参加","貸切・パーティー利用","VIP利用","初めての来店","その他"] },
      { id:"source",   type:"radio",    label:"GENIUS TOKYOをどこでお知りになりましたか？", required:false,
        options:["Google検索 / Googleマップ","Instagram / SNS","知人・友人の紹介","イベント情報サイト","通りがかり","以前から知っていた","その他"] },
      { id:"message",  type:"textarea", label:"よろしければ、本日のご感想をお聞かせください",
        placeholder:"例）音楽と照明の雰囲気がとても良く、友人とも楽しい時間を過ごせました。また来たいです！",
        required:false, isCopyTarget:true },
    ],
  };
  </script>
  <style>
    /* ===== Design tokens ===== */
    :root {
      --theme:    #0A0A0B;
      --surface2: #15140F;
      --accent:   #C9A646;
      --accent-soft: rgba(201,166,70,.16);
      --light:    rgba(201,166,70,.10);
      --bg:       #0A0A0B;
      --surface:  #141311;
      --text:     #EDE9E2;
      --muted:    #948C78;
      --border:   rgba(201,166,70,.28);
      --border-soft: rgba(201,166,70,.14);
      --radius:   2px;
      --shadow:   0 12px 40px rgba(0,0,0,.55);
      --err:      #C9544A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 60px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(ellipse 600px 400px at 50% -5%, rgba(201,166,70,.10), transparent 60%),
        radial-gradient(ellipse 500px 500px at 100% 100%, rgba(201,166,70,.05), transparent 60%);
      z-index: -1;
    }

    /* ===== Header ===== */
    .header {
      background: linear-gradient(180deg, #0A0A0B 0%, #0E0D0A 100%);
      color: var(--text);
      text-align: center;
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid var(--border-soft);
    }
    .header::after {
      content: '';
      position: absolute;
      left: 50%;
      bottom: -1px;
      width: 120px;
      height: 1px;
      transform: translateX(-50%);
      background: var(--accent);
    }
    .header-hero-wrap {
      position: relative;
      overflow: hidden;
      max-height: 200px;
      display: none;
    }
    .header-hero {
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      display: block;
      filter: grayscale(.2) contrast(1.05);
    }
    .header-hero-wrap::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 70px;
      background: linear-gradient(transparent, var(--theme));
    }
    .header-inner {
      position: relative;
      z-index: 1;
      padding: 40px 24px 28px;
    }
    .crest-line {
      width: 40px;
      height: 1px;
      background: var(--accent);
      margin: 0 auto 14px;
      opacity: .7;
    }
    .logo-text {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 600;
      letter-spacing: .14em;
      margin-bottom: 6px;
      color: var(--text);
    }
    .logo-sub {
      font-size: 10px;
      letter-spacing: .32em;
      color: var(--accent);
      font-weight: 500;
    }
    .logo-img {
      max-height: 64px;
      max-width: 200px;
      margin-bottom: 10px;
      object-fit: contain;
    }
    .header-sub {
      font-family: 'Noto Serif JP', serif;
      font-size: 12.5px;
      letter-spacing: .06em;
      color: var(--muted);
      margin-top: 16px;
    }

    /* ===== Progress ===== */
    .progress-wrap {
      background: rgba(201,166,70,.14);
      height: 2px;
      margin-top: 22px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: var(--accent);
      transition: width .4s ease;
      width: 0%;
      box-shadow: 0 0 8px rgba(201,166,70,.7);
    }

    /* ===== Container ===== */
    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    /* ===== Question Card ===== */
    .card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 22px;
      margin-bottom: 14px;
      border: 1px solid var(--border-soft);
      position: relative;
      opacity: 0;
      transform: translateY(14px);
      animation: slideUp .5s ease forwards;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 70%);
      opacity: .55;
    }
    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .q-index {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: .18em;
      color: var(--accent);
      display: block;
      margin-bottom: 8px;
    }
    .q-label {
      font-size: 14.5px;
      font-weight: 500;
      line-height: 1.7;
      margin-bottom: 18px;
      color: var(--text);
    }
    .q-label .req,
    .q-label .opt {
      display: inline-block;
      font-size: 9.5px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 2px 7px;
      margin-left: 8px;
      vertical-align: middle;
      border: 1px solid var(--border);
    }
    .q-label .req { color: var(--accent); background: var(--accent-soft); }
    .q-label .opt { color: var(--muted); background: transparent; }

    /* ===== Stars ===== */
    .stars {
      display: flex;
      gap: 10px;
      justify-content: center;
      padding: 10px 0;
    }
    .star-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 36px;
      color: rgba(201,166,70,.22);
      transition: color .15s, transform .15s, text-shadow .15s;
      line-height: 1;
      padding: 0 2px;
    }
    .star-btn:hover,
    .star-btn.active {
      color: var(--accent);
      text-shadow: 0 0 14px rgba(201,166,70,.85);
    }
    .star-btn:hover { transform: scale(1.1); }
    .star-label {
      text-align: center;
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      color: var(--muted);
      min-height: 18px;
      margin-top: 8px;
      letter-spacing: .04em;
    }

    /* ===== Radio / Checkbox ===== */
    .options { display: flex; flex-direction: column; gap: 10px; }
    .opt-label {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      border: 1px solid var(--border-soft);
      cursor: pointer;
      font-size: 13.5px;
      font-weight: 400;
      transition: border-color .15s, background .15s;
      user-select: none;
      color: var(--text);
    }
    .opt-label:hover { border-color: var(--accent); background: var(--light); }
    .opt-label input { display: none; }
    .opt-check {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--border);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color .15s, background .15s;
    }
    .opt-label.selected { border-color: var(--accent); background: var(--light); }
    .opt-label.selected .opt-check {
      background: var(--accent);
      border-color: var(--accent);
    }
    .opt-label.selected .opt-check::after {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--theme);
      border-radius: 50%;
    }
    .opt-label.checkbox .opt-check { border-radius: 2px; }
    .opt-label.checkbox.selected .opt-check::after {
      content: '✓';
      font-size: 11px;
      font-weight: 700;
      color: var(--theme);
      border-radius: 0;
      width: auto;
      height: auto;
      background: none;
    }

    /* ===== Textarea ===== */
    .answer-textarea {
      width: 100%;
      border: 1px solid var(--border-soft);
      border-radius: 2px;
      padding: 14px 16px;
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 13.5px;
      color: var(--text);
      resize: vertical;
      min-height: 120px;
      transition: border-color .15s;
      outline: none;
      background: #0E0D0A;
      line-height: 1.8;
    }
    .answer-textarea::placeholder { color: var(--muted); opacity: .6; }
    .answer-textarea:focus { border-color: var(--accent); }
    .textarea-hint {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 8px;
      line-height: 1.5;
    }

    /* ===== Copy Button ===== */
    .copy-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      background: none;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 12.5px;
      font-weight: 700;
      letter-spacing: .04em;
      padding: 13px 16px;
      cursor: pointer;
      margin-top: 14px;
      transition: background .15s, color .15s;
      width: 100%;
      justify-content: center;
    }
    .copy-btn:hover { background: var(--light); }
    .copy-btn.copied {
      background: var(--accent);
      color: var(--theme);
      border-color: var(--accent);
    }
    .copy-icon svg { width: 14px; height: 14px; display: block; }

    /* ===== Submit Button ===== */
    .submit-wrap { text-align: center; margin-top: 10px; }
    .submit-btn {
      background: var(--accent);
      color: var(--theme);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .12em;
      padding: 17px 40px;
      border: none;
      border-radius: 1px;
      cursor: pointer;
      width: 100%;
      max-width: 360px;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      box-shadow: 0 8px 24px rgba(201,166,70,.25);
    }
    .submit-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(201,166,70,.4);
    }
    .submit-btn:active { transform: translateY(0); }
    .submit-btn:disabled {
      background: #2A2820;
      color: var(--muted);
      box-shadow: none;
      cursor: not-allowed;
      transform: none;
    }
    .submit-note {
      font-size: 11px;
      color: var(--muted);
      margin-top: 12px;
      letter-spacing: .02em;
    }

    /* ===== Thank You Screen ===== */
    #thanks-screen {
      display: none;
      text-align: center;
      padding: 50px 16px 20px;
      animation: fadeIn .7s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .thanks-icon {
      width: 46px;
      height: 46px;
      margin: 0 auto 20px;
      display: block;
      color: var(--accent);
    }
    .thanks-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text);
      margin-bottom: 12px;
    }
    .thanks-body {
      font-family: 'Noto Serif JP', serif;
      font-size: 12.5px;
      color: var(--muted);
      line-height: 2;
      margin-bottom: 36px;
      letter-spacing: .02em;
    }

    /* ===== Review Guide Card ===== */
    .review-guide {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 22px;
      margin-bottom: 22px;
      text-align: left;
      position: relative;
    }
    .review-guide::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent 70%);
    }
    .review-guide-title {
      font-family: 'Noto Serif JP', serif;
      font-weight: 700;
      font-size: 14px;
      color: var(--text);
      margin-bottom: 16px;
      letter-spacing: .02em;
    }
    .review-guide-title .accent-mark { color: var(--accent); margin-right: 6px; }
    .review-steps {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .review-steps li {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      font-size: 12.5px;
      line-height: 1.7;
      color: var(--text);
    }
    .step-num {
      border: 1px solid var(--accent);
      color: var(--accent);
      width: 20px;
      height: 20px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ===== Review Button ===== */
    .review-btn {
      display: block;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--accent);
      font-family: 'Zen Kaku Gothic New', sans-serif;
      font-size: 13.5px;
      font-weight: 700;
      letter-spacing: .08em;
      padding: 16px 24px;
      border-radius: 1px;
      text-decoration: none;
      text-align: center;
      transition: background .15s, color .15s;
      margin-bottom: 16px;
    }
    .review-btn:hover { background: var(--accent); color: var(--theme); }

    .skip-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: block;
      text-align: center;
      letter-spacing: .04em;
    }
    .skip-link:hover { color: var(--accent); }

    /* ===== Sending State ===== */
    .sending-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,11,.92);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 18px;
    }
    .sending-overlay.active { display: flex; }
    .spinner {
      width: 34px;
      height: 34px;
      border: 1px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .sending-overlay p {
      font-family: 'Noto Serif JP', serif;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: .1em;
    }

    /* ===== Error / Validation ===== */
    .error-msg {
      color: var(--err);
      font-size: 11.5px;
      margin-top: 8px;
      display: none;
      letter-spacing: .02em;
    }
    .card.has-error { border-color: var(--err); }
    .card.has-error::before { background: var(--err); }

    .card:nth-child(1)  { animation-delay: .05s; }
    .card:nth-child(2)  { animation-delay: .10s; }
    .card:nth-child(3)  { animation-delay: .15s; }
    .card:nth-child(4)  { animation-delay: .20s; }
    .card:nth-child(5)  { animation-delay: .25s; }
    .card:nth-child(6)  { animation-delay: .30s; }
    .card:nth-child(7)  { animation-delay: .35s; }
    .card:nth-child(8)  { animation-delay: .40s; }

    @media (max-width: 480px) {
      .star-btn { font-size: 30px; }
    }

    @media (prefers-reduced-motion: reduce) {
      .card { animation: none; opacity: 1; transform: none; }
      .submit-btn:hover { transform: none; }
    }
  </style>
</head>
<body>

<!-- ===== Sending Overlay ===== -->
<div class="sending-overlay" id="sending-overlay">
  <div class="spinner"></div>
  <p>送信中</p>
</div>

<!-- ===== Header ===== -->
<header class="header">
  <div class="header-hero-wrap" id="header-hero-wrap">
    <img id="header-hero-img" class="header-hero" src="" alt="" />
  </div>
  <div class="header-inner">
    <div class="crest-line"></div>
    <div id="logo-area"></div>
    <p class="header-sub">本日のご感想をお聞かせください</p>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
  </div>
</header>

<!-- ===== Survey Form ===== -->
<div class="container">
  <form id="survey-form" novalidate>
    <div id="questions-wrap"></div>

    <div class="submit-wrap">
      <button type="submit" class="submit-btn" id="submit-btn" disabled>
        送信する
      </button>
      <p class="submit-note">回答後、高評価のお客様にはGoogle口コミ投稿のご案内が表示されます</p>
    </div>
  </form>

  <!-- ===== Thank You Screen ===== -->
  <div id="thanks-screen">
    <svg class="thanks-icon" viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="1"/>
      <path d="M15 24.5L21 30.5L33 17.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <h2 class="thanks-title" id="thanks-title"></h2>
    <p class="thanks-body">
      いただいたご意見はスタッフ全員で共有し、<br>
      より良いサービスのために活かしてまいります。
    </p>

    <div class="review-guide" id="review-guide" style="display:none;">
      <p class="review-guide-title">
        <span class="accent-mark">—</span>Google口コミへのご投稿もお願いできますか？
      </p>
      <ul class="review-steps">
        <li>
          <span class="step-num">1</span>
          <span>下の「<strong>メッセージをコピーする</strong>」ボタンを押してください</span>
        </li>
        <li>
          <span class="step-num">2</span>
          <span>「<strong>Google口コミを書く</strong>」ボタンを押してGoogleマップを開きます</span>
        </li>
        <li>
          <span class="step-num">3</span>
          <span>口コミ入力欄を<strong>長押し → ペースト</strong>するだけで投稿できます</span>
        </li>
      </ul>

      <div id="copy-preview" style="margin-top:18px;padding:14px;background:#0E0D0A;border:1px solid var(--border-soft);font-size:12.5px;color:var(--text);line-height:1.8;display:none;"></div>

      <button class="copy-btn" id="copy-btn" type="button">
        <span class="copy-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="8" y="8" width="13" height="13" rx="1"/><path d="M16 8V5a1 1 0 0 0-1-1H4a1 1 0 0 0-1 1v11a1 1 0 0 0 1 1h3"/></svg>
        </span>
        <span id="copy-label">メッセージをコピーする</span>
      </button>

      <a href="#" class="review-btn" id="review-btn-inline" style="display:none;margin-top:16px;">
        Google口コミを書く
      </a>
    </div>

    <a href="#" class="review-btn" id="review-btn">
      Google口コミを書く
    </a>

    <a href="#" class="skip-link" onclick="location.reload();return false;">
      最初に戻る
    </a>
  </div>
</div>

<!-- ===== Main Script ===== -->
<script>
(function () {
  if (CONFIG.themeColor) {
    document.documentElement.style.setProperty('--theme', CONFIG.themeColor);
  }
  if (CONFIG.accentColor) {
    document.documentElement.style.setProperty('--accent', CONFIG.accentColor);
  }

  const logoArea = document.getElementById('logo-area');
  if (CONFIG.logoUrl) {
    logoArea.innerHTML = `<img src="${CONFIG.logoUrl}" alt="${CONFIG.shopName}" class="logo-img" />`;
  } else {
    logoArea.innerHTML = `
      <div class="logo-text">GENIUS TOKYO</div>
      <div class="logo-sub">GINZA &nbsp;NIGHT&nbsp; CLUB</div>
    `;
  }
  document.title = `お客様アンケート | ${CONFIG.shopName}`;

  if (CONFIG.headerImageUrl) {
    const heroWrap = document.getElementById('header-hero-wrap');
    const heroImg  = document.getElementById('header-hero-img');
    heroImg.src = CONFIG.headerImageUrl;
    heroImg.alt = CONFIG.shopName;
    heroWrap.style.display = 'block';
  }

  document.getElementById('thanks-title').textContent = CONFIG.thankYouMessage || 'ご回答ありがとうございました';

  const starLabels = ['', 'とても不満', '不満', '普通', '満足', 'とても満足'];

  const wrap = document.getElementById('questions-wrap');
  const answers = {};

  CONFIG.questions.forEach((q, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${q.id}`;

    const reqBadge = q.required
      ? `<span class="req">必須</span>`
      : `<span class="opt">任意</span>`;

    const num = String(idx + 1).padStart(2, '0');

    card.innerHTML = `
      <span class="q-index">${num}</span>
      <div class="q-label">${q.label}${reqBadge}</div>
      <div class="q-body" id="body-${q.id}"></div>
      <div class="error-msg" id="err-${q.id}">この項目を選択してください</div>
    `;
    wrap.appendChild(card);

    const body = document.getElementById(`body-${q.id}`);

    if (q.type === 'stars') {
      renderStars(body, q);
    } else if (q.type === 'radio' || q.type === 'checkbox') {
      renderOptions(body, q);
    } else if (q.type === 'textarea') {
      renderTextarea(body, q);
    }
  });

  function renderStars(container, q) {
    const starsEl = document.createElement('div');
    starsEl.className = 'stars';
    const labelEl = document.createElement('div');
    labelEl.className = 'star-label';

    for (let i = 1; i <= 5; i++) {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'star-btn';
      btn.textContent = '★';
      btn.dataset.value = i;

      btn.addEventListener('click', () => {
        answers[q.id] = i;
        updateStars(starsEl, i);
        labelEl.textContent = starLabels[i];
        clearError(q.id);
        updateProgress();
        checkSubmitEnabled();
      });

      btn.addEventListener('mouseenter', () => {
        updateStars(starsEl, i);
        labelEl.textContent = starLabels[i];
      });

      starsEl.addEventListener('mouseleave', () => {
        const cur = answers[q.id] || 0;
        updateStars(starsEl, cur);
        labelEl.textContent = cur ? starLabels[cur] : '';
      });

      starsEl.appendChild(btn);
    }
    container.appendChild(starsEl);
    container.appendChild(labelEl);
  }

  function updateStars(wrap, value) {
    wrap.querySelectorAll('.star-btn').forEach((btn, idx) => {
      btn.classList.toggle('active', idx < value);
    });
  }

  function renderOptions(container, q) {
    const optWrap = document.createElement('div');
    optWrap.className = 'options';

    q.options.forEach((opt) => {
      const label = document.createElement('label');
      label.className = `opt-label${q.type === 'checkbox' ? ' checkbox' : ''}`;

      const input = document.createElement('input');
      input.type = q.type;
      input.name = q.id;
      input.value = opt;

      const check = document.createElement('span');
      check.className = 'opt-check';

      const text = document.createElement('span');
      text.textContent = opt;

      label.appendChild(input);
      label.appendChild(check);
      label.appendChild(text);
      optWrap.appendChild(label);

      input.addEventListener('change', () => {
        if (q.type === 'radio') {
          optWrap.querySelectorAll('.opt-label').forEach(l => l.classList.remove('selected'));
          label.classList.add('selected');
          answers[q.id] = opt;
        } else {
          label.classList.toggle('selected', input.checked);
          const checked = Array.from(optWrap.querySelectorAll('input:checked')).map(i => i.value);
          answers[q.id] = checked;
        }
        clearError(q.id);
        updateProgress();
        checkSubmitEnabled();
      });
    });
    container.appendChild(optWrap);
  }

  function renderTextarea(container, q) {
    const ta = document.createElement('textarea');
    ta.className = 'answer-textarea';
    ta.placeholder = q.placeholder || 'こちらにご記入ください';
    ta.id = `ta-${q.id}`;

    ta.addEventListener('input', () => {
      answers[q.id] = ta.value;
      updateProgress();
      checkSubmitEnabled();
    });

    container.appendChild(ta);
  }

  function isAnswered(q) {
    const a = answers[q.id];
    if (a === undefined || a === null) return false;
    if (typeof a === 'string' && a.trim() === '') return false;
    if (Array.isArray(a) && a.length === 0) return false;
    return true;
  }

  function updateProgress() {
    const required = CONFIG.questions.filter(q => q.required);
    const answered = required.filter(isAnswered);
    const pct = required.length ? (answered.length / required.length) * 100 : 100;
    document.getElementById('progress-bar').style.width = pct + '%';
  }

  function checkSubmitEnabled() {
    const required = CONFIG.questions.filter(q => q.required);
    const allOk = required.every(isAnswered);
    document.getElementById('submit-btn').disabled = !allOk;
  }

  function validate() {
    let ok = true;
    CONFIG.questions.forEach(q => {
      if (!q.required) return;
      if (!isAnswered(q)) {
        showError(q.id);
        ok = false;
      }
    });
    return ok;
  }
  function showError(id) {
    document.getElementById(`card-${id}`).classList.add('has-error');
    document.getElementById(`err-${id}`).style.display = 'block';
  }
  function clearError(id) {
    document.getElementById(`card-${id}`).classList.remove('has-error');
    document.getElementById(`err-${id}`).style.display = 'none';
  }

  function buildPayload(action) {
    const copyQ = CONFIG.questions.find(q => q.isCopyTarget);
    const copyText = copyQ ? (answers[copyQ.id] || '').trim() : '';
    return {
      action,
      shopName: CONFIG.shopName,
      shopCategory: CONFIG.shopCategory,
      pageUrl: location.href,
      userAgent: navigator.userAgent,
      timestamp: new Date().toISOString(),
      overallScore: answers.overall || '',
      copyText,
      answers: { ...answers },
    };
  }

  async function sendToGAS(payload) {
    if (!CONFIG.gasWebAppUrl) {
      console.info('GAS URL未設定のため、スプレッドシート保存をスキップしました。');
      return;
    }
    await fetch(CONFIG.gasWebAppUrl, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });
  }

  document.getElementById('survey-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) {
      const firstErr = document.querySelector('.has-error');
      if (firstErr) firstErr.scrollIntoView({ behavior: 'smooth', block: 'center' });
      return;
    }

    document.getElementById('sending-overlay').classList.add('active');
    const payload = buildPayload('survey_submit');

    try {
      await sendToGAS(payload);
    } catch (err) {
      console.warn('GAS送信エラー（画面遷移は継続します）:', err);
    }

    showThanks();
  });

  function showThanks() {
    document.getElementById('sending-overlay').classList.remove('active');
    document.getElementById('survey-form').style.display = 'none';
    const thanksEl = document.getElementById('thanks-screen');
    thanksEl.style.display = 'block';
    const overallScore = answers['overall'] || 0;
    if (overallScore <= 3) {
      document.getElementById('review-guide').style.display = 'none';
      document.getElementById('review-btn').style.display = 'none';
      thanksEl.scrollIntoView({ behavior: 'smooth' });
      return;
    }

    let reviewUrl = CONFIG.googleReviewUrl;
    if (!reviewUrl && CONFIG.googlePlaceId && !CONFIG.googlePlaceId.includes('xxx')) {
      reviewUrl = `https://search.google.com/local/writereview?placeid=${CONFIG.googlePlaceId}`;
    }

    const reviewBtnMain = document.getElementById('review-btn');
    if (reviewUrl) {
      reviewBtnMain.href   = reviewUrl;
      reviewBtnMain.target = '_blank';
      reviewBtnMain.rel    = 'noopener';
    } else {
      reviewBtnMain.style.display = 'none';
    }

    const copyQ    = CONFIG.questions.find(q => q.isCopyTarget);
    const copyText = copyQ ? (answers[copyQ.id] || '').trim() : '';

    if (copyText) {
      document.getElementById('review-guide').style.display = 'block';
      reviewBtnMain.style.display = 'none';

      const preview = document.getElementById('copy-preview');
      preview.style.display = 'block';
      preview.textContent = copyText;

      const reviewBtnInline = document.getElementById('review-btn-inline');
      if (reviewUrl) {
        reviewBtnInline.href   = reviewUrl;
        reviewBtnInline.target = '_blank';
        reviewBtnInline.rel    = 'noopener';
      }

      const copyBtn   = document.getElementById('copy-btn');
      const copyLabel = document.getElementById('copy-label');
      let copied = false;

      copyBtn.addEventListener('click', async () => {
        if (copied) return;
        try {
          await navigator.clipboard.writeText(copyText);
        } catch {
          const ta = document.createElement('textarea');
          ta.value = copyText;
          ta.style.cssText = 'position:fixed;opacity:0;';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          document.body.removeChild(ta);
        }
        copied = true;
        copyBtn.classList.add('copied');
        copyLabel.textContent = 'コピーしました';

        sendToGAS(buildPayload('copy_click')).catch(err => console.warn('コピークリック送信エラー:', err));

        if (reviewUrl) {
          reviewBtnInline.style.display  = 'flex';
          reviewBtnInline.style.opacity  = '0';
          reviewBtnInline.style.transform = 'translateY(8px)';
          reviewBtnInline.style.transition = 'opacity .4s ease, transform .4s ease';
          requestAnimationFrame(() => {
            reviewBtnInline.style.opacity  = '1';
            reviewBtnInline.style.transform = 'translateY(0)';
          });
        }
      });
    }

    thanksEl.scrollIntoView({ behavior: 'smooth' });
  }
})();
</script>
</body>
</html>
